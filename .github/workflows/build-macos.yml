name: build-macos-client

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: macos-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            rust_target: x86_64-apple-darwin
            runner: macos-15-intel
            deployment_target: "10.15"
          - arch: arm64
            rust_target: aarch64-apple-darwin
            runner: macos-latest
            deployment_target: "11.0"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install TypeScript compiler
        run: npm install -g typescript

      - name: Install video build tools
        run: brew install nasm

      - name: Build AuroraOps client
        working-directory: new-client
        env:
          CARGO_BUILD_JOBS: 4
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
        run: cargo build --release --target ${{ matrix.rust_target }} --bin auroraops-agent

      - name: Stage release files
        id: stage
        working-directory: new-client
        run: |
          version="$(awk -F '"' '/^version = / { print $2; exit }' Cargo.toml)"
          release="${RELEASE:-1}"
          package_version="${version}-${release}"
          mkdir -p "dist/macos/${{ matrix.arch }}"
          cp "target/${{ matrix.rust_target }}/release/auroraops-agent" "dist/macos/${{ matrix.arch }}/auroraops-agent"
          tar -czf "dist/macos/${{ matrix.arch }}/auroraops-agent-${package_version}-macos-${{ matrix.arch }}.tar.gz" -C "dist/macos/${{ matrix.arch }}" auroraops-agent
          rm "dist/macos/${{ matrix.arch }}/auroraops-agent"
          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"

      - name: Publish to dev rolling release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_name="AuroraOps Agent ${{ steps.stage.outputs.package_version }} dev rolling build"
          if ! gh release view dev >/dev/null 2>&1; then
            gh release create dev --prerelease --title "$release_name" --notes "AuroraOps Agent dev rolling build."
          else
            gh release edit dev --title "$release_name" --prerelease
          fi
          gh release upload dev new-client/dist/macos/${{ matrix.arch }}/* --clobber
