name: build-windows-client

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: windows-${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            rust_target: x86_64-pc-windows-msvc
            msvc_arch: x64
            artifact: auroraops-client-windows-x64
          - arch: arm64
            rust_target: aarch64-pc-windows-msvc
            msvc_arch: amd64_arm64
            artifact: auroraops-client-windows-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Select MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Install MSYS2 build tools
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          path-type: inherit
          update: true
          install: >-
            diffutils
            gawk
            git
            make
            patch

      - name: Install TypeScript compiler
        run: npm install -g typescript

      - name: Add MSYS2 to PATH
        shell: pwsh
        run: |
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH
          echo "C:\msys64\usr\bin" >> $env:GITHUB_PATH

      - name: Keep MSVC linker first
        shell: pwsh
        run: |
          $cl = (where.exe cl | Select-Object -First 1)
          Split-Path $cl | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify build tools
        shell: pwsh
        run: |
          where.exe cl
          where.exe link
          where.exe clang-cl
          bash --version | Select-Object -First 1
          make --version | Select-Object -First 1

      - name: Build AuroraOps client
        working-directory: new-client
        env:
          CARGO_BUILD_JOBS: 4
          LIBCLANG_PATH: C:\Program Files\LLVM\bin
        run: cargo build --release --target ${{ matrix.rust_target }} --bin auroraops-agent

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build setup exe
        working-directory: new-client
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"' | Select-Object -First 1).Matches.Groups[1].Value
          makensis.exe /DVERSION=$version /DARCH=${{ matrix.arch }} /DSOURCE_EXE="$PWD\target\${{ matrix.rust_target }}\release\auroraops-agent.exe" packaging\windows\auroraops-client.nsi

      - name: Stage artifacts
        working-directory: new-client
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\windows\${{ matrix.arch }} | Out-Null
          Copy-Item target\${{ matrix.rust_target }}\release\auroraops-agent.exe dist\windows\${{ matrix.arch }}\auroraops-agent-windows-${{ matrix.arch }}.exe
          Copy-Item AuroraOps-Client-Setup-*-${{ matrix.arch }}.exe dist\windows\${{ matrix.arch }}\

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: new-client/dist/windows/${{ matrix.arch }}/*
