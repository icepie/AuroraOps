name: build-windows-client

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: windows-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            rust_target: x86_64-pc-windows-gnullvm
            runner: windows-latest
            msystem: CLANG64
            package_prefix: mingw-w64-clang-x86_64
            extra_packages: mingw-w64-clang-x86_64-nasm
          - arch: arm64
            rust_target: aarch64-pc-windows-gnullvm
            runner: windows-11-arm
            msystem: CLANGARM64
            package_prefix: mingw-w64-clang-aarch64
            extra_packages: ''
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install MSYS2 build tools
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          path-type: inherit
          update: true
          install: >-
            diffutils
            gawk
            git
            make
            patch
            ${{ matrix.package_prefix }}-clang
            ${{ matrix.package_prefix }}-cmake
            ${{ matrix.package_prefix }}-cppwinrt
            ${{ matrix.package_prefix }}-ninja
            ${{ matrix.package_prefix }}-pkgconf
            ${{ matrix.extra_packages }}

      - name: Install TypeScript compiler
        run: npm install -g typescript

      - name: Verify build tools
        shell: msys2 {0}
        run: |
          clang --version | head -1
          cmake --version | head -1
          pkg-config --version
          make --version | head -1
          cargo --version

      - name: Build AuroraOps client
        working-directory: new-client
        shell: msys2 {0}
        env:
          AR: llvm-ar
          CC: clang
          CXX: clang++
          CARGO_BUILD_JOBS: 4
          CMAKE_GENERATOR: Ninja
          CARGO_TARGET_X86_64_PC_WINDOWS_GNULLVM_LINKER: clang
          CARGO_TARGET_AARCH64_PC_WINDOWS_GNULLVM_LINKER: clang
        run: |
          export LIBCLANG_PATH="$(cygpath -w "$MSYSTEM_PREFIX/bin")"
          export AURORAOPS_MSYS2_BASH="$(cygpath -w /usr/bin/bash.exe)"
          unset GIT_EXEC_PATH
          export PATH="/usr/bin:$PATH"
          echo "LIBCLANG_PATH=$LIBCLANG_PATH"
          echo "AURORAOPS_MSYS2_BASH=$AURORAOPS_MSYS2_BASH"
          which git
          git --version
          git --exec-path
          test -x "$(git --exec-path)/git-remote-https"
          cargo build --release --target ${{ matrix.rust_target }} --bin auroraops-agent

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build setup exe
        working-directory: new-client
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"' | Select-Object -First 1).Matches.Groups[1].Value
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) {
            $makensis = "makensis.exe"
          }
          & $makensis /DVERSION=$version /DARCH=${{ matrix.arch }} /DSOURCE_EXE="$PWD\target\${{ matrix.rust_target }}\release\auroraops-agent.exe" packaging\windows\auroraops-client.nsi

      - name: Stage release files
        id: stage
        working-directory: new-client
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"' | Select-Object -First 1).Matches.Groups[1].Value
          $release = if ($env:RELEASE) { $env:RELEASE } else { "1" }
          $packageVersion = "$version-$release"
          New-Item -ItemType Directory -Force dist\windows\${{ matrix.arch }} | Out-Null
          Copy-Item target\${{ matrix.rust_target }}\release\auroraops-agent.exe dist\windows\${{ matrix.arch }}\auroraops-agent-$packageVersion-windows-${{ matrix.arch }}.exe
          $setup = Get-ChildItem packaging\windows\AuroraOps-Client-Setup-*-${{ matrix.arch }}.exe | Select-Object -First 1
          if (-not $setup) {
            throw "Windows setup exe was not produced"
          }
          Copy-Item $setup.FullName dist\windows\${{ matrix.arch }}\AuroraOps-Client-Setup-$packageVersion-windows-${{ matrix.arch }}.exe
          "package_version=$packageVersion" >> $env:GITHUB_OUTPUT

      - name: Publish to dev rolling release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $releaseName = "AuroraOps Agent ${{ steps.stage.outputs.package_version }} dev rolling build"
          gh release view dev *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create dev --prerelease --title $releaseName --notes "AuroraOps Agent dev rolling build."
          } else {
            gh release edit dev --title $releaseName --prerelease
          }
          Get-ChildItem new-client\dist\windows\${{ matrix.arch }}\* | ForEach-Object {
            gh release upload dev $_.FullName --clobber
          }
