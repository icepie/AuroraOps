name: docker-server

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'Dockerfile.server'
      - '.dockerignore'
      - 'server/**'
      - 'web/**'
      - '.github/workflows/docker-server.yml'
  workflow_dispatch:
    inputs:
      image:
        description: 'Docker Hub image name, for example: your-dockerhub-user/auroraops-server'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.image }}" ]]; then
            echo "name=${{ github.event.inputs.image }}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ vars.DOCKERHUB_IMAGE }}" ]]; then
            echo "name=${{ vars.DOCKERHUB_IMAGE }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ secrets.DOCKERHUB_USERNAME }}/auroraops-server" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=main-,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
